server.port=8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.application.name=diag-agent

server.tomcat.connection-timeout=120000
server.tomcat.keep-alive-timeout=120000
server.tomcat.threads.max=200
spring.mvc.async.request-timeout=120000

logging.level.root=INFO
logging.level.io.github.zzz8688.diagagent=DEBUG
logging.level.dev.langchain4j=DEBUG

langchain4j.dashscope.chat-model.api-key=${API_Key}
langchain4j.dashscope.chat-model.model-name=qwen-turbo
langchain4j.dashscope.chat-model.log-requests=true
langchain4j.dashscope.chat-model.log-responses=true

langchain4j.community.dashscope.embedding-model.api-key=${API_Key}
langchain4j.community.dashscope.embedding-model.model-name=text-embedding-v1

spring.data.mongodb.uri=mongodb://root:1234@localhost:27017/diagagent?authSource=admin
spring.data.mongodb.database=diagagent

spring.datasource.url=jdbc:mysql://localhost:3306/diagagent?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.character-encoding=UTF-8
spring.datasource.hikari.connection-init-sql=SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci

spring.jpa.properties.hibernate.connection.characterEncoding=utf-8
spring.jpa.properties.hibernate.connection.useUnicode=true
spring.jpa.properties.hibernate.connection.CharSet=utf-8

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.continue-on-error=false

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none

mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.id-type=auto

milvus.host=localhost
milvus.port=19530
milvus.collection-name=diagagent_embeddings_1536
milvus.dimension=1536
